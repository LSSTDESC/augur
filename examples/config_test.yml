# Test config for Augur (uses both legacy-path keys in sources/lenses
# and the factory path via Firecrown_Factory + systematics).
# See README.md for all available options.

general:
    ignore_scale_cuts: False

cosmo:
    Omega_c: 0.2664315
    Omega_b: 0.0491685
    h: 0.6727
    n_s: 0.9645
    sigma8: 0.831
    extra_parameters:
        camb:
            dark_energy_model: 'ppf'
            halofit_version: 'takahashi'

systematics:
    src0_mult_bias: 0.0
    src1_mult_bias: 0.0
    src2_mult_bias: 0.0
    src3_mult_bias: 0.0
    src4_mult_bias: 0.0
    src0_delta_z: 0.0
    src1_delta_z: 0.0
    src2_delta_z: 0.0
    src3_delta_z: 0.0
    src4_delta_z: 0.0
    ia_bias: 5.717
    alphaz: -0.47
    z_piv: 0.3
    lens0_bias: 1.562362
    lens1_bias: 1.732963
    lens2_bias: 1.913252
    lens3_bias: 2.100644
    lens4_bias: 2.293210
    lens0_alphaz: 0.0
    lens1_alphaz: 0.0
    lens2_alphaz: 0.0
    lens3_alphaz: 0.0
    lens4_alphaz: 0.0
    lens0_z_piv: 0.0
    lens1_z_piv: 0.0
    lens2_z_piv: 0.0
    lens3_z_piv: 0.0
    lens4_z_piv: 0.0
    lens0_alphag: 0.0
    lens1_alphag: 0.0
    lens2_alphag: 0.0
    lens3_alphag: 0.0
    lens4_alphag: 0.0
    lens0_delta_z: 0.0
    lens1_delta_z: 0.0
    lens2_delta_z: 0.0
    lens3_delta_z: 0.0
    lens4_delta_z: 0.0
    lens0_sigma_z: 1.0
    lens1_sigma_z: 1.0
    lens2_sigma_z: 1.0
    lens3_sigma_z: 1.0
    lens4_sigma_z: 1.0

# See README section "Firecrown_Factory" for all available systematic factories.
Firecrown_Factory:
    TwoPointFactory:
        correlation_space: harmonic
        number_counts_factories:
            - type_source: default
              global_systematics: []
              include_rsd: false
              per_bin_systematics:
                - {type: PhotoZShiftandStretchFactory}
                - {type: LinearBiasSystematicFactory}
        weak_lensing_factories:
            - type_source: default
              global_systematics:
                - {type: LinearAlignmentSystematicFactory, alphag: 1}
              per_bin_systematics:
                - {type: MultiplicativeShearBiasFactory}
                - {type: PhotoZShiftFactory}
        cmb_factories: []
        int_options: null

ccl_accuracy:
    spline_params:
        K_MAX_SPLINE: 100
    gsl_params:
        INTEGRATION_EPSREL: 1e-6
        INTEGRATION_LIMBER_EPSREL: 1e-2

# See README section "sources" for alternative Nz_type options.
sources:
    nbins: 5
    ndens: 10
    ellipticity_error: 0.26
    Nz_type: 'ZDistFromFile'
    Nz_kwargs:
        input_file: "{{ env['AUGUR_DIR'] }}/data/srd_source_bins_y1.txt"
        format: 'ascii'
    mult_bias: 0
    delta_z: 0
    ia_class: 'wl.LinearAlignmentSystematic'
    ia_bias: 5.
    alphaz: 1.
    z_piv: 1.0
    ia_kwargs:

lenses:
    nbins: 5
    ndens: 18
    delta_z: 0
    Nz_type: 'ZDistFromFile'
    Nz_kwargs:
        input_file: "{{ env['AUGUR_DIR'] }}/data/srd_lens_bins_y1.txt"
        format: 'ascii'
    bias_type: 'custom'
    bias_kwargs:
        b: [1.562362, 1.732963, 1.913252, 2.100644, 2.293210]

statistics:
    galaxy_density_cl:
        tracer_combs: [[0, 0], [1, 1], [2, 2], [3, 3], [4, 4]]
        ell_edges: np.geomspace(20, 15000, 21, endpoint=True)
        kmax: 0.201
    galaxy_shear_cl_ee:
        tracer_combs: [[0, 0], [0, 1], [0, 2], [0, 3], [0, 4],
                       [1, 1], [1, 2], [1, 3], [1, 4],
                       [2, 2], [2, 3], [2, 4],
                       [3, 3], [3, 4],
                       [4, 4]]
        ell_edges: np.geomspace(20, 15000, 21, endpoint=True)
        kmax: None
    galaxy_shearDensity_cl_e:
        tracer_combs: [[0, 2], [0, 3], [0, 4], [1, 3], [1, 4], [2, 4], [3, 4]]
        ell_edges: np.geomspace(20, 15000, 21, endpoint=True)
        kmax: 0.201

fiducial_sacc_path: test_sacc.sacc

# See README section "cov_options" for gaus_internal and tjpcov alternatives.
cov_options:
    cov_type: 'SRD'
    SRD_cov_path: "{{ env['AUGUR_DIR'] }}/data/Y1_3x2_SRD_cov.npy"

# See README section "fisher" for parameter transforms, derivkit args,
# and the alternative `parameters` mode with explicit bounds.
fisher:
    var_pars: ['Omega_c', 'sigma8', 'n_s', 'w0', 'wa', 'Omega_b', 'h',
               'lens0_bias', 'lens1_bias', 'lens2_bias', 'lens3_bias', 'lens4_bias',
               'src0_mult_bias', 'src1_mult_bias', 'src2_mult_bias', 'src3_mult_bias', 'src4_mult_bias',
               'lens0_delta_z', 'lens1_delta_z', 'lens2_delta_z', 'lens3_delta_z', 'lens4_delta_z',
               'src0_delta_z', 'src1_delta_z', 'src2_delta_z', 'src3_delta_z', 'src4_delta_z']
    step: 1e-2
    output: "{{ env['AUGUR_DIR'] }}/output/fisher.dat"
    fid_output: "{{ env['AUGUR_DIR'] }}/output/fiducials.dat"
    fisher_bias:
        biased_dv: ''
        bias_params:
            Omega_c: 0.27
            lens0_bias: 1.3
            lens0_delta_z: 0.01
            src3_delta_z: 0.005

postprocess:
  latex_table: "{{ env['AUGUR_DIR'] }}/output/latex_table.tex"
  triangle_plot: "{{ env['AUGUR_DIR'] }}/output/triangle_plot.pdf"
  facecolor: blue
  pairplots: [(w0, wa), (omega_c, sigma8)]
  outdir: "{{ env['AUGUR_DIR'] }}/output/"
  CL:
    - 0.68
    - 0.95
