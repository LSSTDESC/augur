# SRD Year 1, 3x2pt analysis with modified gravity (mu-Sigma parametrization).
# See README.md for all available options.

fiducial_sacc_path: test_test_test_all_y1_mg.sacc

general:
    ignore_scale_cuts: True
    ignore_scale_cuts_likelihood: True
    bandpower_windows: None

cosmo:
    Omega_c: 0.2664
    Omega_b: 0.0492
    h: 0.6727
    n_s: 0.9645
    sigma8: 0.831
    w0: -1.0
    wa: 0.0
    Omega_k: 0.0
    mg_parametrization:
        mu_Sigma:
            mu_0: 0.0
            sigma_0: 0.0
            c1_mg: 1.0
            c2_mg: 1.0
            lambda_mg: 0.0
    transfer_function: boltzmann_isitgr
    matter_power_spectrum: linear

# See README sections "ccl_accuracy", "pt_calculator", "hm_calculator"
# for additional accuracy tuning and non-linear modeling options.
ccl_accuracy:
    spline_params:
        K_MAX_SPLINE: 100

systematics:
    src0_mult_bias: 0.0
    src1_mult_bias: 0.0
    src2_mult_bias: 0.0
    src3_mult_bias: 0.0
    src4_mult_bias: 0.0
    src0_delta_z: 0.0
    src1_delta_z: 0.0
    src2_delta_z: 0.0
    src3_delta_z: 0.0
    src4_delta_z: 0.0
    ia_bias: 0.0
    alphaz: -0.47
    z_piv: 0.3
    lens0_bias: 1.562362
    lens1_bias: 1.732963
    lens2_bias: 1.913252
    lens3_bias: 2.100644
    lens4_bias: 2.293210
    lens0_alphaz: 0.0
    lens1_alphaz: 0.0
    lens2_alphaz: 0.0
    lens3_alphaz: 0.0
    lens4_alphaz: 0.0
    lens0_z_piv: 0.0
    lens1_z_piv: 0.0
    lens2_z_piv: 0.0
    lens3_z_piv: 0.0
    lens4_z_piv: 0.0
    lens0_alphag: 0.0
    lens1_alphag: 0.0
    lens2_alphag: 0.0
    lens3_alphag: 0.0
    lens4_alphag: 0.0
    lens0_delta_z: 0.0
    lens1_delta_z: 0.0
    lens2_delta_z: 0.0
    lens3_delta_z: 0.0
    lens4_delta_z: 0.0
    lens0_sigma_z: 1.0
    lens1_sigma_z: 1.0
    lens2_sigma_z: 1.0
    lens3_sigma_z: 1.0
    lens4_sigma_z: 1.0

# See README section "Firecrown_Factory" for all available systematic factories.
Firecrown_Factory:
    TwoPointFactory:
        correlation_space: harmonic
        number_counts_factories:
            - type_source: default
              global_systematics: []
              include_rsd: false
              per_bin_systematics:
                - {type: PhotoZShiftandStretchFactory}
                - {type: LinearBiasSystematicFactory}
        weak_lensing_factories:
            - type_source: default
              global_systematics:
                - {type: LinearAlignmentSystematicFactory, alphag: 1}
              per_bin_systematics:
                - {type: MultiplicativeShearBiasFactory}
                - {type: PhotoZShiftFactory}
        cmb_factories: []
        int_options: null

# See README section "sources" for alternative Nz_type options.
sources:
    nbins: 5
    ndens: 10
    ellipticity_error: 0.26
    Nz_type: 'ZDistFromFile'
    Nz_kwargs:
        input_file: "{{ env['AUGUR_DIR'] }}/data/srd_source_bins_y1.txt"
        format: 'ascii'

lenses:
    nbins: 5
    ndens: 18
    Nz_type: 'ZDistFromFile'
    Nz_kwargs:
        input_file: "{{ env['AUGUR_DIR'] }}/data/srd_lens_bins_y1.txt"
        format: 'ascii'

statistics:
    galaxy_shear_cl_ee:
        tracer_combs: [[0, 0], [0, 1], [0, 2], [0, 3], [0, 4],
                       [1, 1], [1, 2], [1, 3], [1, 4],
                       [2, 2], [2, 3], [2, 4],
                       [3, 3], [3, 4],
                       [4, 4]]
        ell_edges: np.geomspace(20, 15000, 21, endpoint=True)
        kmax: None
    galaxy_shearDensity_cl_e:
        tracer_combs: [[0, 2], [0, 3], [0, 4], [1, 3], [1, 4], [2, 4], [3, 4]]
        ell_edges: np.geomspace(20, 15000, 21, endpoint=True)
        kmax: 0.202
    galaxy_density_cl:
        tracer_combs: [[0, 0], [1, 1], [2, 2], [3, 3], [4, 4]]
        ell_edges: np.geomspace(20, 15000, 21, endpoint=True)
        kmax: 0.202

# See README section "cov_options" for gaus_internal and tjpcov alternatives.
cov_options:
    cov_type: 'SRD'
    SRD_cov_path: "{{ env['AUGUR_DIR'] }}/data/Y1_3x2_SRD_cov.npy"

# See README section "fisher" for full options including gaussian_priors,
# fisher_bias, and alternative derivative methods.
fisher:
    parameters:
        Omega_c: [0.1, 0.26, 0.9]
        sigma8: [0.4, 0.81, 1.2]
        h: [0.5, 0.6727, 0.8]
        Omega_b: [0.01, 0.022, 0.05]
        n_s: [0.9, 0.9645, 1.0]
        mg_musigma_mu: [-2.0, 0.0, 2.0]
        mg_musigma_sigma: [-2.0, 0.0, 2.0]
    step: 0.05
    output: 'output/mg_fisher.dat'
    fid_output: 'output/mg_fiducials.dat'
    derivative_method: 'numdifftools'
    fisher_bias:
        biased_dv: ''
        bias_params:
            mg_musigma_mu: 0.2

postprocess:
  latex_table: output/latex_table.tex
  triangle_plot: output/triangle_plot.pdf
  facecolor: blue
  pairplots: [(w0, wa), (Omega_m, S8)]
  outdir: 'output/'
  CL:
    - 0.68
    - 0.95
