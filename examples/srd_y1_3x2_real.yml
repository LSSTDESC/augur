# SRD Year 1, 3x2pt analysis (factory path).
# See README.md for all available options.

fiducial_sacc_path: test_test_test_all_y1_real.sacc

general:
    ignore_scale_cuts: True
    ignore_scale_cuts_likelihood: True
    bandpower_windows: None

cosmo:
    Omega_c: 0.2664
    Omega_b: 0.0492
    h: 0.6727
    n_s: 0.9645
    sigma8: 0.831
    w0: -1.0
    wa: 0.0
    Omega_k: 0.0
    transfer_function: 'eisenstein_hu'
    matter_power_spectrum: 'halofit'

# See README sections "ccl_accuracy", "pt_calculator", "hm_calculator"
# for additional accuracy tuning and non-linear modeling options.
ccl_accuracy:
    spline_params:
        K_MAX_SPLINE: 100

systematics:
    src0_mult_bias: 0.0
    src1_mult_bias: 0.0
    src2_mult_bias: 0.0
    src3_mult_bias: 0.0
    src4_mult_bias: 0.0
    src0_delta_z: 0.0
    src1_delta_z: 0.0
    src2_delta_z: 0.0
    src3_delta_z: 0.0
    src4_delta_z: 0.0
    ia_bias: 5.717
    alphaz: -0.47
    z_piv: 0.3
    # lens0_bias: 1.562362
    # lens1_bias: 1.732963
    # lens2_bias: 1.913252
    # lens3_bias: 2.100644
    # lens4_bias: 2.293210
    # lens0_alphaz: 0.0
    # lens1_alphaz: 0.0
    # lens2_alphaz: 0.0
    # lens3_alphaz: 0.0
    # lens4_alphaz: 0.0
    # lens0_z_piv: 0.0
    # lens1_z_piv: 0.0
    # lens2_z_piv: 0.0
    # lens3_z_piv: 0.0
    # lens4_z_piv: 0.0
    # lens0_alphag: 0.0
    # lens1_alphag: 0.0
    # lens2_alphag: 0.0
    # lens3_alphag: 0.0
    # lens4_alphag: 0.0
    # lens0_delta_z: 0.0
    # lens1_delta_z: 0.0
    # lens2_delta_z: 0.0
    # lens3_delta_z: 0.0
    # lens4_delta_z: 0.0
    # lens0_sigma_z: 1.0
    # lens1_sigma_z: 1.0
    # lens2_sigma_z: 1.0
    # lens3_sigma_z: 1.0
    # lens4_sigma_z: 1.0

# See README section "Firecrown_Factory" for all available systematic factories.
Firecrown_Factory:
    TwoPointFactory:
        correlation_space: real
        weak_lensing_factories:
            - type_source: default
              global_systematics:
                - {type: LinearAlignmentSystematicFactory, alphag: 1}
              per_bin_systematics:
                - {type: MultiplicativeShearBiasFactory}
                - {type: PhotoZShiftFactory}
        cmb_factories: []
        int_options: null

# See README section "sources" for alternative Nz_type options.
sources:
    nbins: 5
    ndens: 10
    ellipticity_error: 0.26
    Nz_type: 'ZDistFromFile'
    Nz_kwargs:
        input_file: "{{ env['AUGUR_DIR'] }}/data/srd_source_bins_y1.txt"
        format: 'ascii'

statistics_real_space:
    galaxy_shear_xi_plus:
        tracer_combs: [[0, 0], [0, 1], [0, 2], [0, 3], [0, 4],
                       [1, 1], [1, 2], [1, 3], [1, 4],
                       [2, 2], [2, 3], [2, 4],
                       [3, 3], [3, 4],
                       [4, 4]]
        theta_edges: np.geomspace(2.5, 250., 21, endpoint=True)
        theta_min: 10.0
    galaxy_shear_xi_minus:
        tracer_combs: [[0, 0], [0, 1], [0, 2], [0, 3], [0, 4],
                       [1, 1], [1, 2], [1, 3], [1, 4],
                       [2, 2], [2, 3], [2, 4],
                       [3, 3], [3, 4],
                       [4, 4]]
        theta_edges: np.geomspace(2.5, 250., 21, endpoint=True)
        theta_min: 10.0


# See README section "cov_options" for gaus_internal and tjpcov alternatives.
cov_options:
    cov_type: 'NONE'
    # SRD_cov_path: "{{ env['AUGUR_DIR'] }}/data/Y1_3x2_SRD_cov.npy"

# See README section "fisher" for parameter transforms, derivkit args,
# and the alternative `parameters` mode with explicit bounds.
fisher:
    var_pars: ['Omega_c', 'sigma8', 'n_s', 'w0', 'wa', 'Omega_b', 'h',
               'lens0_bias', 'lens1_bias']
    step: 1e-5
    output: 'output/fisher.dat'
    fid_output: 'output/fiducials.dat'
    derivative_method: 'numdifftools'
    gaussian_priors:
       lens0_bias: 0.9
       lens1_bias: 0.9
       lens2_bias: 0.9
       lens3_bias: 0.9
       lens4_bias: 0.9
       lens0_delta_z: 0.005
       lens1_delta_z: 0.005
       lens2_delta_z: 0.005
       lens3_delta_z: 0.005
       lens4_delta_z: 0.005
       src0_delta_z: 0.002
       src1_delta_z: 0.002
       src2_delta_z: 0.002
       src3_delta_z: 0.002
       src4_delta_z: 0.002
       src0_mult_bias: 0.013
       src1_mult_bias: 0.013
       src2_mult_bias: 0.013
       src3_mult_bias: 0.013
       src4_mult_bias: 0.013
       ia_bias: 3.9
       alphaz: 2.3
       Omega_c : 0.2 # actually for Omega_m, as per SRD p43
       Omega_b : 0.006 #SRD p43
       h : 0.063
       n_s : 0.08
       sigma8 : 0.14
       w0: 0.8
       wa: 2.0 
    fisher_bias:
        biased_dv: ''  # Path to file containing modified data vector with the systematic shift to probe
                    # If the file is provided it should be a FITS or ASCII file with the  same binning as the
                    # fiducial data vector and the column dv_sys
        bias_params: 
            Omega_c: 0.27
            lens0_bias: 1.3
            lens0_delta_z: 0.01
            src3_delta_z: 0.005
        
postprocess:
  latex_table: output/latex_table.tex
  triangle_plot: output/triangle_plot.pdf
  facecolor: blue
  pairplots: [(w0, wa), (Omega_m, S8)]
  outdir: 'output/'
  CL: 
    - 0.68
    - 0.95
