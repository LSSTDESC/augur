version: 2

conda:
  environment: environment.yml

python:
  install:
    - requirements: docs/requirements.txt

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_install:

      - pip install -e .
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html
      - cp -r _build/html/* $READTHEDOCS_OUTPUT/html/ || true

sphinx:
  configuration: conf.py
