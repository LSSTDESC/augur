version: 2

conda:
  environment: environment.yml

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_install:
      - pip install -U sphinx numpydoc sphinx-rtd-theme
      - pip install -e .
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html
      - mv _build/html/* $READTHEDOCS_OUTPUT/html/ || true

sphinx:
  configuration: conf.py
